<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>智行时刻表 · 指挥中心</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>

<!-- 悬浮头部，始终随页面滑动 -->
<div class="floating-header">
    <div class="logo-area">
        <div class="logo-icon">⏱</div>
        <div class="logo-text">
        </div>
    </div>
    <div id="headerAuthArea">
        <!-- 动态显示登录按钮或用户信息 -->
        <button id="globalLoginBtn" class="login-btn-fixed" onclick="document.getElementById('globalLoginModal').style.display = 'block'">🔐 登录账户</button>
        <div id="globalUserInfo" style="display: none;" class="user-info-bar">
            <span>欢迎，<strong id="globalDisplayName">用户</strong></span>
            <button id="globalLogoutBtn" class="logout-small">退出</button>
        </div>
    </div>
</div>

<!-- 主内容区域：标题+8个大按钮 -->
<div class="main-dashboard">
    <div class="page-title-section">
        <h2>时刻表查询</h2>
        <p>Beta测试版，功能仍在完善中</p>
    </div>

    <div class="button-grid" id="buttonGridContainer">
        <div class="giant-card" data-action="timetable" data-idx="1" onclick="document.location.href='timetable.html'">
            <div class="card-icon"></div>
            <h3>时刻表查询</h3>
            <p>添加查询时刻表</p>
            <div class="badge-coming active-badge">立即使用</div>
        </div>
        <!-- 其余7个敬请期待按钮 -->
        <div class="giant-card" data-action="comming" data-idx="2">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="3">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="4">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="5">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="6">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="7">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="8">
            <div class="badge-coming">敬请期待</div>
        </div>
    </div>
</div>

<!-- 登录模态框 -->
<div id="globalLoginModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3>登录系统</h3>
            <span class="close-modal" id="closeModalBtn" onclick="document.getElementById('globalLoginModal').style.display = 'none'">&times;</span>
        </div>
        <div class="modal-body">
            <form id="loginForm">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-submit">登 录</button>
                <div id="Errorlongin" class="error-msg" style="display: none;"></div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button class="login-submit" style="background: #e0e8f2; color: #7b98ab; cursor: not-allowed;" disabled>
                        注册账户 (暂未开放)
                    </button>
                    <p style="font-size: 0.8rem; color: #8aa0af; margin-top: 0.5rem;">注册功能将在后续版本开放</p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
